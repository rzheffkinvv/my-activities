<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Активностей - MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-50 via-slate-50 to-slate-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans text-slate-900 antialiased">

    <div class="w-full max-w-sm mb-6 text-center">
        <label for="categoryFilter" class="block text-xs font-semibold uppercase tracking-widest text-slate-400 mb-2">Настроение на сегодня</label>
        <div class="relative">
            <select id="categoryFilter" class="w-full bg-white/80 backdrop-blur-md border border-slate-200/80 rounded-2xl px-5 py-3 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm font-medium appearance-none cursor-pointer" disabled>
                <option value="all">🌟 Загрузка категорий...</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 text-slate-400">
                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
            </div>
        </div>
    </div>

    <div class="w-full max-w-sm bg-white rounded-3xl shadow-[0_20px_50px_rgba(99,102,241,0.08)] border border-slate-100/80 overflow-hidden relative min-h-[520px] flex flex-col justify-between transition-all duration-300 hover:shadow-[0_20px_60px_rgba(99,102,241,0.12)]">
        
        <div id="loading" class="absolute inset-0 bg-white/80 backdrop-blur-md z-10 flex flex-col items-center justify-center transition-opacity duration-300">
            <div class="relative flex items-center justify-center">
                <div class="animate-ping absolute inline-flex h-12 w-12 rounded-full bg-indigo-400 opacity-25"></div>
                <div class="relative rounded-full h-8 w-8 border-2 border-indigo-600 border-t-transparent animate-spin"></div>
            </div>
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 mt-4 animate-pulse">Ищем идею...</p>
        </div>

        <div id="error" class="hidden absolute inset-0 bg-white z-10 p-8 flex flex-col items-center justify-center text-center">
            <div class="w-12 h-12 rounded-2xl bg-rose-50 flex items-center justify-center mb-3">
                <span class="text-xl">⚠️</span>
            </div>
            <p class="text-slate-900 font-bold mb-1">Ошибка загрузки данных</p>
            <p class="text-xs text-slate-400 max-w-[240px]">Проверь публикацию таблицы и ссылку в файле script.js</p>
        </div>

        <div id="cardContent" class="opacity-0 transition-opacity duration-300 flex flex-col h-full">
            
            <div class="relative h-56 w-full bg-slate-100 overflow-hidden">
                <img id="actImage" src="" alt="Активность" class="w-full h-full object-cover transition-transform duration-700 hover:scale-105">
                <div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-transparent opacity-90"></div>
                
                <span id="actCategory" class="absolute top-4 left-4 bg-slate-900/80 backdrop-blur-md text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-xl shadow-sm">
                    Категория
                </span>
            </div>

            <div class="p-6 pt-2 flex-grow flex flex-col justify-between">
                <div>
                    <h2 id="actTitle" class="text-2xl font-extrabold text-slate-900 tracking-tight leading-tight mb-2">
                        Заголовок активности
                    </h2>
                    <p id="actDescription" class="text-slate-500 text-sm leading-relaxed mb-5">
                        Описание активности появится здесь.
                    </p>
                </div>

                <div class="bg-slate-50/80 border border-slate-100 rounded-2xl p-4 mt-auto">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-xs">📍</span>
                        <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Где или как</h3>
                    </div>
                    <p id="actRecommendations" class="text-slate-700 text-sm font-medium whitespace-pre-line leading-relaxed">
                        Рекомендации и места.
                    </p>
                </div>
            </div>
        </div>

        <div class="p-6 pt-0 mt-auto">
            <button id="nextBtn" class="w-full bg-slate-900 hover:bg-indigo-600 active:scale-[0.99] text-white font-semibold py-3.5 px-4 rounded-2xl shadow-lg shadow-slate-900/5 hover:shadow-indigo-600/10 transition-all duration-300 flex items-center justify-center gap-2 text-sm cursor-pointer tracking-wide">
                <span>Следующая идея</span>
                <span class="text-xs opacity-60">→</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
