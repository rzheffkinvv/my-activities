<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Активностей - MVP</title>
    <!-- Подключаем Tailwind для базовых отступов и шрифтов -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Жесткие стили темной темы -->
    <style>
        body {
            background-color: #020617 !important; /* Глубокий черный/угольный */
            /* Настоящая сетка в стиле 21st.dev */
            background-image: 
                linear-gradient(to right, #1e293b 1px, transparent 1px),
                linear-gradient(to bottom, #1e293b 1px, transparent 1px) !important;
            background-size: 4rem 4rem !important;
        }
        
        .dark-card {
            background-color: #0f172a !important; /* Темный фон карточки */
            border: 1px solid #334155 !important; /* Тонкая серая рамка */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6) !important;
        }

        .dark-select {
            background-color: #0f172a !important;
            color: #f1f5f9 !important;
            border: 1px solid #334155 !important;
        }

        .dark-bento {
            background-color: #020617 !important; /* Блок рекомендаций еще темнее */
            border: 1px solid #1e293b !important;
        }

        /* Белая контрастная кнопка */
        .white-btn {
            background-color: #ffffff !important;
            color: #020617 !important;
            font-weight: 600 !important;
            transition: all 0.2s ease !important;
        }
        .white-btn:hover {
            background-color: #e2e8f0 !important;
            transform: translateY(-1px);
        }
        .white-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 font-sans text-slate-100 antialiased">

    <!-- Селектор категорий (Сделан чуть шире под новую карточку) -->
    <div class="w-full max-w-xl mb-5">
        <div class="relative">
            <select id="categoryFilter" class="dark-select w-full rounded-xl pl-4 pr-10 py-3.5 text-sm font-medium appearance-none cursor-pointer" disabled>
                <option value="all">🌟 Загрузка категорий...</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
        </div>
    </div>

    <!-- Контейнер карточки (max-w-xl делает её шире и внушительнее) -->
    <div class="dark-card w-full max-w-xl rounded-2xl overflow-hidden relative min-h-[580px] flex flex-col justify-between transition-all duration-300">
        
        <!-- Состояние загрузки (Темный оверлей) -->
        <div id="loading" class="absolute inset-0 bg-slate-900/95 z-10 flex flex-col items-center justify-center transition-opacity duration-200">
            <div class="h-6 w-6 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
        </div>

        <!-- Состояние ошибки -->
        <div id="error" class="hidden absolute inset-0 bg-slate-900 z-10 p-6 flex flex-col items-center justify-center text-center">
            <span class="text-2xl mb-2">⚠️</span>
            <p class="text-white font-semibold text-sm mb-1">Ошибка загрузки данных</p>
            <p class="text-xs text-slate-500">Проверь ссылку в script.js</p>
        </div>

        <!-- Контент карточки -->
        <div id="cardContent" class="opacity-0 transition-opacity duration-300 flex flex-col h-full">
            
            <!-- Изображение (h-80 делает картинку большой и сочной) -->
            <div class="relative h-80 w-full bg-slate-950 border-b border-slate-800 overflow-hidden">
                <img id="actImage" src="" alt="Активность" class="w-full h-full object-cover opacity-90">
                <!-- Плавный темный градиент поверх картинки -->
                <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-transparent to-transparent opacity-80"></div>
                
                <!-- Категория -->
                <span id="actCategory" class="absolute top-4 left-4 bg-indigo-600 text-white text-[10px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-md shadow-sm">
                    Категория
                </span>
            </div>

            <!-- Контентная часть (Добавили больше внутренних отступов) -->
            <div class="p-6 flex-grow flex flex-col justify-between">
                <div class="mb-5">
                    <!-- Заголовок (Крупнее и заметнее) -->
                    <h2 id="actTitle" class="text-2xl font-bold text-white tracking-tight leading-snug mb-2.5">
                        Заголовок активности
                    </h2>
                    <!-- Описание -->
                    <p id="actDescription" class="text-slate-400 text-sm leading-relaxed">
                        Описание активности появится здесь.
                    </p>
                </div>

                <!-- Рекомендации (Красивый широкий блок) -->
                <div class="dark-bento rounded-xl p-4 mt-auto">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-indigo-400 block mb-1.5">Где или как</span>
                    <p id="actRecommendations" class="text-slate-300 text-sm font-medium whitespace-pre-line leading-relaxed">
                        Рекомендации и места.
                    </p>
                </div>
            </div>
        </div>

        <!-- Кнопка -->
        <div class="p-6 pt-0 mt-auto">
            <button id="nextBtn" class="white-btn w-full py-4 px-4 rounded-xl shadow-sm flex items-center justify-center gap-2 text-sm cursor-pointer tracking-wide">
                <span>Следующая идея</span>
                <span>→</span>
            </button>
        </div>
    </div>

</body>
<!-- Подключаем логику -->
<script src="script.js"></script>
</html>
